
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{display:flex;height:100vh;min-height:700px;font-family:var(--font-sans)}
.sidebar{width:210px;flex-shrink:0;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:16px 18px;display:flex;align-items:center;gap:9px;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo-mark{width:28px;height:28px;border-radius:7px;background:#185FA5;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:15px;height:15px;fill:white}
.logo-text{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.logo-text span{font-size:10px;font-weight:400;color:var(--color-text-tertiary);display:block;margin-top:1px}
.nav-section{padding:14px 10px 4px;font-size:10px;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 6px;border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-secondary);cursor:pointer;transition:background .12s}
.nav-item:hover{background:var(--color-background-secondary)}
.nav-item.active{background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-dot{width:6px;height:6px;border-radius:50%;margin-left:auto;flex-shrink:0}
.nav-footer{margin-top:auto;padding:12px 10px;border-top:0.5px solid var(--color-border-tertiary)}
.plan-badge{background:var(--color-background-warning);color:var(--color-text-warning);font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;display:inline-block;margin-bottom:8px}
.upgrade-btn{width:100%;padding:8px;font-size:12px;font-weight:500;background:#185FA5;color:white;border:none;border-radius:var(--border-radius-md);cursor:pointer}
.main{flex:1;overflow-y:auto;background:var(--color-background-tertiary)}
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left h1{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.topbar-left p{font-size:12px;color:var(--color-text-tertiary);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.drange{display:flex;gap:4px}
.dr-btn{padding:5px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.dr-btn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent;font-weight:500}
.content{padding:18px 22px}
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px}
.kpi-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:500;color:var(--color-text-primary);line-height:1.1}
.kpi-delta{font-size:11px;margin-top:4px}
.up{color:#1D9E75}.down{color:#D85A30}
.row2{display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:10px;margin-bottom:16px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px}
.card-hd{display:flex;align-items:start;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.card-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.platform-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.chip.on{border-color:currentColor}
.chip.off{opacity:.4}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:12px;color:var(--color-text-secondary);width:72px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:7px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-val{font-size:12px;color:var(--color-text-tertiary);width:44px;text-align:right;flex-shrink:0}
.ptable{width:100%;border-collapse:collapse}
.ptable th{font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-align:left;padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.ptable td{font-size:12px;padding:8px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
.ptable tr:last-child td{border-bottom:none}
.pill{display:inline-flex;align-items:center;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}
.ai-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:16px}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-icon{width:28px;height:28px;border-radius:8px;background:#E6F1FB;display:flex;align-items:center;justify-content:center}
.ai-icon svg{width:15px;height:15px;fill:#185FA5}
.ai-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.ai-sub{font-size:11px;color:var(--color-text-tertiary)}
.insight-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.insight{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px}
.insight-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;display:inline-block;margin-bottom:6px}
.insight-text{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.insight-action{font-size:11px;font-weight:500;margin-top:6px;color:var(--color-text-info);cursor:pointer}
.seo-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
.seo-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:11px}
.seo-stat-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:3px}
.seo-stat-val{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.mediakit-wrap{max-width:680px;margin:0 auto}
.mk-header{background:#185FA5;border-radius:var(--border-radius-lg);padding:28px;margin-bottom:12px;color:white;display:flex;align-items:center;gap:18px}
.mk-avatar{width:64px;height:64px;border-radius:50%;background:#378ADD;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:white;flex-shrink:0}
.mk-name{font-size:20px;font-weight:500;color:white}
.mk-handle{font-size:13px;color:#85B7EB;margin-top:2px}
.mk-bio{font-size:13px;color:#B5D4F4;margin-top:6px;line-height:1.5}
.mk-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
.mk-stat{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;text-align:center}
.mk-stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.mk-stat-label{font-size:11px;color:var(--color-text-tertiary);margin-top:3px}
.mk-stat-plat{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.mk-platforms{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.mk-plat{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;display:flex;align-items:center;gap:12px}
.mk-plat-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mk-plat-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.mk-plat-detail{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.mk-plat-stats{margin-left:auto;text-align:right;flex-shrink:0}
.mk-plat-stat-val{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.mk-plat-stat-label{font-size:10px;color:var(--color-text-tertiary)}
.mk-footer{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px;display:flex;align-items:center;justify-content:space-between}
.mk-footer-text{font-size:12px;color:var(--color-text-secondary)}
.share-btn{padding:8px 16px;background:#185FA5;color:white;border:none;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;cursor:pointer}
.copy-btn{padding:8px 16px;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer}
.pricing-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
.price-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:20px}
.price-card.popular{border:2px solid #185FA5}
.popular-badge{background:#E6F1FB;color:#0C447C;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
.price-name{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.price-amount{font-size:28px;font-weight:500;color:var(--color-text-primary);line-height:1}
.price-period{font-size:12px;color:var(--color-text-tertiary)}
.price-usd{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.price-divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:14px 0}
.price-feature{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--color-text-secondary);margin-bottom:7px}
.price-feature svg{width:13px;height:13px;flex-shrink:0}
.price-btn{width:100%;padding:9px;font-size:13px;font-weight:500;border-radius:var(--border-radius-md);cursor:pointer;margin-top:14px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.price-btn.primary{background:#185FA5;color:white;border-color:transparent}
</style>

  <div class="topbar">
    <div class="topbar-left">
      <h1 id="page-title">All platforms overview</h1>
      <p id="page-sub">Last 30 days · 5 platforms connected</p>

        <button class="dr-btn" onclick="setRange(this)">7d</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const pData = {
  instagram:{name:'Instagram',icon:'📷',color:'#E1306C',bg:'#fce4ec',followers:142800,reach:890400,impressions:2100000,eng:4.2,fgrow:'+2.4%'},
  youtube:{name:'YouTube',icon:'▶',color:'#FF0000',bg:'#ffebee',followers:68400,reach:1240000,impressions:3800000,eng:7.1,fgrow:'+1.1%'},
  tiktok:{name:'TikTok',icon:'♪',color:'#8e44ad',bg:'#f3e5f5',followers:91600,reach:2100000,impressions:5400000,eng:9.2,fgrow:'+8.4%'},
  linkedin:{name:'LinkedIn',icon:'in',color:'#0077B5',bg:'#e3f2fd',followers:24100,reach:310000,impressions:720000,eng:5.4,fgrow:'+3.2%'},
  pinterest:{name:'Pinterest',icon:'P',color:'#E60023',bg:'#fce4ec',followers:18200,reach:140000,impressions:380000,eng:3.1,fgrow:'+1.8%'},
};
const labels=['Jun 1','Jun 6','Jun 11','Jun 16','Jun 21','Jun 26','Jun 30'];
const reachSeries={
  instagram:[28000,31000,35000,42000,38000,45000,52000],
  youtube:[38000,44000,48000,42000,51000,55000,60000],
  tiktok:[55000,62000,80000,95000,88000,110000,130000],
  linkedin:[8000,10000,11000,12000,10500,13000,14000],
  pinterest:[4000,5000,6000,5500,7000,8000,9000],
};
let charts=[];
function clearCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}

function nav(view, el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el && el.classList && el.classList.add('active');
  const titles={overview:'All platforms overview',ai:'AI-powered insights',seo:'Website SEO analytics',mediakit:'Sponsor media kit',pricing:'Plans & pricing'};
  const subs={overview:'Last 30 days · 5 platforms connected',ai:'Personalised recommendations based on your data',seo:'Google Search Console · Last 30 days',mediakit:'Share with brands to get sponsorships',pricing:'India-first pricing — pay in ₹'};
  document.getElementById('page-title').textContent=titles[view]||'Dashboard';
  document.getElementById('page-sub').textContent=subs[view]||'';
  clearCharts();
  if(view==='overview') renderOverview();
  else if(view==='ai') renderAI();
  else if(view==='seo') renderSEO();
  else if(view==='mediakit') renderMediaKit();
  else if(view==='pricing') renderPricing();
}

function setRange(btn){document.querySelectorAll('.dr-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function renderOverview(){
  const pids=Object.keys(pData);
  const totalReach=pids.reduce((s,p)=>s+pData[p].reach,0);
  const totalImp=pids.reduce((s,p)=>s+pData[p].impressions,0);
  const totalFol=pids.reduce((s,p)=>s+pData[p].followers,0);
  const avgEng=(pids.reduce((s,p)=>s+pData[p].eng,0)/pids.length).toFixed(1);
  const el=document.getElementById('page-content');
  el.innerHTML=`
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total reach</div><div class="kpi-val">${(totalReach/1e6).toFixed(2)}M</div><div class="kpi-delta up">↑ 14.3% vs last period</div></div>
    <div class="kpi"><div class="kpi-label">Total impressions</div><div class="kpi-val">${(totalImp/1e6).toFixed(1)}M</div><div class="kpi-delta up">↑ 11.8% vs last period</div></div>
    <div class="kpi"><div class="kpi-label">Total followers</div><div class="kpi-val">${(totalFol/1000).toFixed(1)}K</div><div class="kpi-delta up">↑ 3.1% this month</div></div>
    <div class="kpi"><div class="kpi-label">Avg engagement</div><div class="kpi-val">${avgEng}%</div><div class="kpi-delta up">↑ 0.4pp vs last period</div></div>
  </div>
  <div class="ai-card">
    <div class="ai-header">
      <div class="ai-icon"><svg viewBox="0 0 16 16"><path d="M8 1a5 5 0 0 1 5 5c0 2.1-1.3 3.9-3.2 4.7V12H6.2v-.3C4.3 9.9 3 8.1 3 6a5 5 0 0 1 5-5z"/><path d="M6 15h4m-3-3v3m2-3v3"/></svg></div>
      <div><div class="ai-title">AI insights — 3 recommendations for you</div><div class="ai-sub">Based on your last 30 days of data</div></div>
    </div>
    <div class="insight-row">
      <div class="insight"><span class="insight-badge" style="background:#E6F1FB;color:#0C447C">Reach</span><div class="insight-text">Your TikTok videos posted on Tuesday get <strong style="color:var(--color-text-primary)">2.8x more reach</strong> than other days. Try posting your next reel on Tuesday.</div><div class="insight-action">Apply this tip ↗</div></div>
      <div class="insight"><span class="insight-badge" style="background:#EAF3DE;color:#3B6D11">Growth</span><div class="insight-text">Instagram Reels drive <strong style="color:var(--color-text-primary)">3.1x more followers</strong> than static posts for you. Shift 60% of your content to Reels.</div><div class="insight-action">See your Reels data ↗</div></div>
      <div class="insight"><span class="insight-badge" style="background:#FAEEDA;color:#633806">Engagement</span><div class="insight-text">Your LinkedIn articles outperform posts by <strong style="color:var(--color-text-primary)">4.2x engagement</strong>. You haven't posted an article in 18 days — write one this week.</div><div class="insight-action">View LinkedIn tips ↗</div></div>
    </div>
  </div>
  <div class="row2">
    <div class="card">
      <div class="card-hd"><div><div class="card-title">Reach over time</div><div class="card-sub">All platforms</div></div></div>
      <div style="position:relative;height:210px"><canvas id="reachChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title">Platform breakdown</div></div>
      <div id="platBars" style="margin-top:8px"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd"><div class="card-title">Top posts</div><div style="font-size:11px;color:var(--color-text-tertiary)">All platforms · last 30 days</div></div>
    <table class="ptable">
      <thead><tr><th>Post</th><th>Platform</th><th>Reach</th><th>Engagement</th><th>Date</th></tr></thead>
      <tbody>

        <tr><td>How we built our studio</td><td><span class="pill" style="background:#ffebee;color:#c0392b">YouTube</span></td><td>128K</td><td>8.2%</td><td style="color:var(--color-text-tertiary)">Jun 27</td></tr>
